<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LMJO 09 | منصة متعاونين على التفوق</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f4f8 0%, #d9e2ec 100%);
            min-height: 100vh;
            direction: rtl;
        }

        /* القائمة الجانبية */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 300px;
            height: 100vh;
            background: linear-gradient(180deg, #1e3c5c 0%, #0f2a3f 100%);
            color: white;
            overflow-y: auto;
            z-index: 100;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }

        .sidebar-header {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 3px solid #f9b81b;
        }

        .sidebar-header h1 {
            font-size: 1.8rem;
            color: #f9b81b;
        }

        .sidebar-header p {
            font-size: 0.85rem;
            margin-top: 8px;
            opacity: 0.8;
        }

        .sidebar-menu {
            padding: 15px 0 30px;
        }

        .menu-section {
            margin-bottom: 25px;
        }

        .menu-section-title {
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: bold;
            color: #f9b81b;
            border-right: 3px solid #f9b81b;
            margin: 10px 0 5px 0;
            background: rgba(0,0,0,0.2);
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 10px 20px;
            background: transparent;
            border: none;
            color: white;
            font-size: 0.95rem;
            text-align: right;
            cursor: pointer;
            transition: all 0.2s ease;
            border-right: 3px solid transparent;
        }

        .menu-btn i {
            width: 28px;
            font-size: 1.1rem;
        }

        .menu-btn:hover {
            background: rgba(249, 184, 27, 0.2);
            border-right-color: #f9b81b;
        }

        .menu-btn.active {
            background: rgba(249, 184, 27, 0.3);
            border-right-color: #f9b81b;
            color: #f9b81b;
        }

        /* نص الإيميل */
        .email-text {
            padding: 10px 20px;
            margin: 5px 15px 10px 15px;
            background: rgba(249, 184, 27, 0.1);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #f9b81b;
            text-align: center;
            direction: ltr;
            border: 1px dashed rgba(249, 184, 27, 0.3);
        }

        .email-text i {
            margin-left: 8px;
            color: #f9b81b;
        }

        /* قسم متعاونين على التفوق المميز */
        .featured-section {
            margin: 20px 15px;
            background: linear-gradient(135deg, rgba(249, 184, 27, 0.2), rgba(249, 184, 27, 0.05));
            border-radius: 20px;
            border: 2px solid #f9b81b;
            overflow: hidden;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(249, 184, 27, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(249, 184, 27, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(249, 184, 27, 0);
            }
        }

        .featured-header {
            background: linear-gradient(135deg, #f9b81b, #e5a00d);
            padding: 12px;
            text-align: center;
            color: #1e3c5c;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .featured-header i {
            margin: 0 5px;
        }

        .featured-content {
            padding: 15px;
            text-align: center;
        }

        .discord-btn-special {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #5865F2, #4752c4);
            border: none;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .discord-btn-special i {
            font-size: 1.5rem;
        }

        .discord-btn-special:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.3);
        }

        .featured-text {
            color: white;
            font-size: 0.9rem;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        .featured-text i {
            color: #f9b81b;
            margin-left: 5px;
        }

        /* منطقة المحتوى */
        .content-area {
            margin-right: 300px;
            padding: 20px;
            min-height: 100vh;
        }

        .iframe-container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 15px 30px rgba(0,0,0,0.1);
            height: calc(100vh - 40px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* زر القائمة للجوال */
        .mobile-menu-btn {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            background: #1e3c5c;
            color: #f9b81b;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 1.2rem;
            color: #1e3c5c;
        }

        .loading i {
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* للجوال */
        @media (max-width: 768px) {
            .sidebar {
                right: -300px;
                transition: right 0.3s ease;
                width: 280px;
            }
            .sidebar.open {
                right: 0;
            }
            .content-area {
                margin-right: 0;
                padding: 70px 15px 15px;
            }
            .mobile-menu-btn {
                display: block;
            }
        }
    </style>
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- القائمة الجانبية -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h1>LMJO 09</h1>
            <p>عبدالرحمن المعايطه</p>
            <p style="font-size:0.8rem;">✨ متعاونين على التفوق ✨</p>
        </div>
        
        <div class="sidebar-menu">
            <!-- قسم مميز لمتعاونين على التفوق وسيرفر ديسكورد -->
            <div class="featured-section">
                <div class="featured-header">
                    <i class="fas fa-users"></i> متعاونين على التفوق <i class="fas fa-star"></i>
                </div>
                <div class="featured-content">
                    <div class="featured-text">
                        <i class="fas fa-lightbulb"></i> تعاون - تنفيذ أفكار - مشاريع
                    </div>
                    <button class="discord-btn-special" onclick="window.open('https://discord.gg/78NKW84H', '_blank')">
                        <i class="fab fa-discord"></i>
                        <span>🚀 سيرفر ديسكورد | المساعدة الدراسية وتنفيذ الأفكار 🚀</span>
                    </button>
                </div>
            </div>

            <!-- الفصل الأول -->
            <div class="menu-section">
                <div class="menu-section-title">📖 الفصل الأول</div>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/DEEN/')">
                    <i class="fas fa-mosque"></i> <span>الدين (الفصل الأول)</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/Ardic/')">
                    <i class="fas fa-book"></i> <span>العربي (الفصل الأول)</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/MMMNII/')">
                    <i class="fas fa-landmark"></i> <span>التاريخ (الفصل الأول)</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/BNK/')">
                    <i class="fas fa-database"></i> <span>📚 بنوك الفصل الأول</span>
                </button>
            </div>

            <!-- الفصل الثاني -->
            <div class="menu-section">
                <div class="menu-section-title">📘 الفصل الثاني</div>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/d1/')">
                    <i class="fas fa-mosque"></i> <span>الدين (الفصل الثاني)</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/a1/')">
                    <i class="fas fa-book"></i> <span>العربي (الفصل الثاني)</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/t1/')">
                    <i class="fas fa-landmark"></i> <span>التاريخ (الفصل الثاني)</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/e1/')">
                    <i class="fas fa-language"></i> <span>الانجليزي (الفصل الثاني)</span>
                </button>
            </div>

            <!-- إضافات مفيدة -->
            <div class="menu-section">
                <div class="menu-section-title">⚡ إضافات مفيدة</div>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/thd1/')">
                    <i class="fas fa-bolt"></i> <span>تحدي السرعة الشامل</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/w2/')">
                    <i class="fas fa-file-alt"></i> <span>امتحانات وزارية سابقة</span>
                </button>
                <button class="menu-btn" onclick="loadPage('https://farmbot1238.github.io/Book/')">
                    <i class="fas fa-book-open"></i> <span>كتب وزارية</span>
                </button>
            </div>

            <!-- تواصل واقتراحات -->
            <div class="menu-section">
                <div class="menu-section-title">📞 تواصل واقتراحات</div>
                <button class="menu-btn" onclick="window.open('https://wa.me/962798688787', '_blank')">
                    <i class="fab fa-whatsapp"></i> <span>واتساب (تواصل مباشر)</span>
                </button>
                <div class="email-text">
                    <i class="fas fa-envelope"></i> abdalrhmanmaaith1@gmail.com
                </div>
                <button class="menu-btn" onclick="window.open('https://docs.google.com/forms/d/e/1FAIpQLSeOP7ow84vcJ-q8tm4YlHsKMCuGdoL-E5OCJw6C66PDrbMpWw/viewform', '_blank')">
                    <i class="fas fa-pray"></i> <span>دعاء للطالب / اقتراح</span>
                </button>
            </div>
        </div>
        <div style="padding: 15px; text-align: center; font-size: 0.7rem; opacity:0.6; border-top:1px solid #2a4a6e;">
            LMJO 09 | متعاونين على التفوق
        </div>
    </div>

    <!-- منطقة عرض المحتوى -->
    <div class="content-area" id="contentArea">
        <div class="iframe-container" id="iframeContainer">
            <div class="loading">
                <i class="fas fa-spinner"></i> اختر أحد الأقسام من القائمة
            </div>
        </div>
    </div>

    <script>
        // تحميل الصفحة داخل iframe
        function loadPage(url) {
            // تحديث الزر النشط
            document.querySelectorAll('.menu-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // إضافة active للزر الحالي
            if (event && event.target) {
                let btn = event.target.closest('.menu-btn');
                if (btn) btn.classList.add('active');
            }
            
            // عرض iframe مع مؤشر تحميل
            const container = document.getElementById('iframeContainer');
            container.innerHTML = `
                <div class="loading" id="loadingIndicator">
                    <i class="fas fa-spinner"></i> جاري التحميل...
                </div>
                <iframe id="contentFrame" src="${url}" style="width:100%; height:100%; display:none;" onload="hideLoading()"></iframe>
            `;
        }
        
        function hideLoading() {
            const loading = document.getElementById('loadingIndicator');
            const iframe = document.getElementById('contentFrame');
            if (loading && iframe) {
                loading.style.display = 'none';
                iframe.style.display = 'block';
            }
        }
        
        // للجوال: إغلاق القائمة بعد الضغط على زر
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        // إغلاق القائمة تلقائيًا عند اختيار أي زر في الجوال
        document.addEventListener('click', function(e) {
            if (window.innerWidth <= 768) {
                let btn = e.target.closest('.menu-btn');
                if (btn && document.getElementById('sidebar').classList.contains('open')) {
                    document.getElementById('sidebar').classList.remove('open');
                }
            }
        });
        
        // عرض ترحيب أولي
        window.addEventListener('load', () => {
            const container = document.getElementById('iframeContainer');
            container.innerHTML = `
                <div style="display: flex; justify-content: center; align-items: center; height: 100%; background: linear-gradient(145deg, #1e3c5c, #0f2a3f); color: white; text-align: center; padding: 20px; flex-direction:column;">
                    <i class="fas fa-graduation-cap" style="font-size: 4rem; color:#f9b81b; margin-bottom:20px;"></i>
                    <h2>مرحباً بك في منصة LMJO 09</h2>
                    <p style="margin:15px 0; font-size:1.1rem;">عبدالرحمن المعايطه | متعاونين على التفوق</p>
                    <div style="margin-top:20px; font-size:0.9rem; opacity:0.8;">اختر القسم المناسب من القائمة الجانبية</div>
                </div>
            `;
        });
    </script>
</body>
</html>
